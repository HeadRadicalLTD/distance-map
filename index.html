  var REGION_ORDER = [];

  function updateCount() {

    CHARGERS.forEach(function(c) {
      var v = visited[c.id];
      if (!v) return;
      total++;
      per[c.gp].n++;
      if (c.pc === "mid") per[c.gp].mid++;
      if (String(v) > latestT) { latestT = String(v); latestGp = c.gp; }
    });

    if (el) el.textContent = total.toLocaleString();

    box.innerHTML = REGION_ORDER.map(function(gp) {

      var midColor = s.mid >= REGION_MID_TARGET ? "#16a34a" : "#b45309";

  window.__naverRoute = function(id) {

  function csvField(s) {
    s = String(s == null ? "" : s);

  }
  document.getElementById("btn-export").addEventListener("click", function() {

    CHARGERS.forEach(function(c) {
      lines.push([c.id, c.gp, c.nm, c.ad, visited[c.id] ? "O" : "X", visited[c.id] || ""].map(csvField).join(","));
    });
    var blob = new Blob(["\ufeff" + lines.join("\r\n")], { type: "text/csv;charset=utf-8;" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "방문기록_" + now().replace(/[-: ]/g, "").slice(0, 12) + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  function parseCsv(text) {
    var rows = [], row = [], cur = "", inQ = false;
    text = text.replace(/^\ufeff/, "");
    for (var i = 0; i < text.length; i++) {
      var ch = text[i];
      if (inQ) {
        if (ch === '"') {
          if (text[i + 1] === '"') { cur += '"'; i++; }
          else inQ = false;
        } else cur += ch;
      } else if (ch === '"') inQ = true;
      else if (ch === ",") { row.push(cur); cur = ""; }
      else if (ch === "\n" || ch === "\r") {
        if (cur !== "" || row.length) { row.push(cur); rows.push(row); row = []; cur = ""; }
      } else cur += ch;
    }
    if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
    return rows;
  }
  document.getElementById("btn-import").addEventListener("click", function() {
    document.getElementById("import-file").click();

  document.getElementById("import-file").addEventListener("change", function(ev) {
    var file = ev.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function() {
      var rows = parseCsv(String(reader.result));
      if (!rows.length) { alert("CSV가 비어 있습니다."); return; }
      var header = rows[0];
      var idCol = header.indexOf("일련번호");
      var visitCol = header.indexOf("방문");
      var timeCol = header.indexOf("방문일시");
      if (idCol < 0 || visitCol < 0) {
        alert("CSV에 '일련번호'와 '방문' 열이 필요합니다. (내보내기 형식 사용)");
        return;
      }
      var added = 0, skipped = 0;
      for (var i = 1; i < rows.length; i++) {
        var id = (rows[i][idCol] || "").trim();
        var flag = (rows[i][visitCol] || "").trim().toUpperCase();
        if (!BYID[id]) { if (id) skipped++; continue; }
        if (["O", "1", "Y", "TRUE", "&#10003;", "\u2713"].indexOf(flag) >= 0) {
          if (!visited[id]) added++;
          visited[id] = (timeCol >= 0 && rows[i][timeCol]) ? rows[i][timeCol] : (visited[id] || now());
        }
      }
      save();
      updateCount();
      CHARGERS.forEach(function(c) {
        c._mk.setStyle(styleFor(c));
        bindLabel(c, c._lab);
      });
      alert("가져오기 완료: 방문 " + added + "건 추가" + (skipped ? ", 알 수 없는 일련번호 " + skipped + "건 무시" : ""));
      ev.target.value = "";
    };
